<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koopalings Mini Game</title>
    <link rel="stylesheet" href="style.css" />
    <link href='https://fonts.googleapis.com/css?family=Pixelify Sans' rel='stylesheet'>
  </head>
  <body>
    <div id="start-screen">
      <img src="koopalingLogo.png" style="width: 40%; height: auto;">
      <p style="text-align: center; width: 550px;">
        The Koopalings have cloned themselves and are 
        wreaking havoc across the Mushroom Kingdom! 
        They are fast, aggressive, and flying high in Koopa Clown Cars. 
        Smash as many as you can with your combat hammer. 
      </p>
      <p>The Mushroom Kingdom is counting on you, good luck!</p>
      <button id="arcade-btn">Arcade</button>
      <button id="classic-btn">Classic</button>
    </div>

    <div id="scoreboard" style="display: none">
      <span id="time-display">Time: <span id="time">45</span>s | </span>Score: <span id="score">0</span>
    </div>

    <div id="balloon-container"></div>

    <audio id="bg-audio" loop>
      <source src="KoopalingBattle.mp3" type="audio/mpeg">
    </audio>
    <audio id="win-audio">
      <source src="CourseClear.mp3" type="audio/mpeg">
    </audio>
    <audio id="lose-audio">
      <source src="GameOver.mp3" type="audio/mpeg">
    </audio>

    <div id="end-screen" style="display: none">
      <h1 id="end-title"></h1>
      <p style="text-align: center;" id="end-message"></p>
      <p style="text-align: center;">Final Score: <span id="final-score"></span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>

    <img id="custom-cursor" src="hammer.png">

    <script src="script.js"></script>
  </body>
</html>
